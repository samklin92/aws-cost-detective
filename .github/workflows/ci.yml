name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-tools:
    name: Deterministic test suite (free, no AWS/Anthropic calls)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        run: python -m pytest tests/ -v
